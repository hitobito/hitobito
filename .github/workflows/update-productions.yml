name: Update many production instances at once

on:
  workflow_dispatch:
    inputs:
      instances:
        type: string
        description: demo, cevi, bdp, die_mitte, digisus_lab, dsj, ejv, glp, insieme, jemk, jubla, multitenancy, pbs, pro_natura, sbv, sjas, skv, svse, swb, sww, dpsg
        required: true
      release:
        type: choice
        description: Type of release. Regular is for normal, planned releases. Patch is for hotfixes and single-customer fix releases. Use custom to manually set a version number.
        required: true
        options:
          - "-- please select --" # Empty by default, to force a conscious choice. Otherwise, in the stress of a Hotfix, a regular release could be selected accidentally.
          - regular
          - patch
          - custom
      version:
        type: string
        description: Manually set version number, if release type is custom
        required: false
      target_branch:
        type: string
        description: Release a specific branch of the core and wagons. Leave empty for intelligent defaults.
        required: false

permissions:
  contents: write

jobs:
  check-release-type:
    name: Check that a release type has been selected
    runs-on: ubuntu-latest
    steps:
      - name: Check release type
        run: |
          if [[ "${{ inputs.release }}" == "-- please select --" ]]; then
            echo "No release type selected. Aborting."
            exit 1
          fi

  determine-version:
    name: Determine version from core
    runs-on: ubuntu-latest
    needs:
      - check-release-type
    outputs:
      version: ${{ steps.determine.outputs.version }}
    steps:
      - name: Checkout hitobito core
        uses: actions/checkout@v6
        with:
          repository: hitobito/hitobito
          ref: master

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler: none

      - name: Install dependencies
        run: gem install cmdparse

      - name: Fetch tags
        run: git fetch --tags

      - name: Determine next version
        id: determine
        env:
          RELEASE_TYPE: ${{ inputs.release }}
          NEXT_VERSION: ${{ inputs.version }}
        run: |
          next_version=$(bin/version suggest "$RELEASE_TYPE" "$NEXT_VERSION")
          echo "version=${next_version}" >> "$GITHUB_OUTPUT"

  find-instances:
    name: Find all selected hitobito instances
    runs-on: ubuntu-latest
    outputs:
      instances: ${{ steps.format-instance-names.outputs.instances }}
    steps:
      - name: Format instance names
        id: format-instance-names
        run: |
          INSTANCES=$(echo "${{ inputs.instances }}" | jq -Rc '[splits("[ ,]+")]')
          echo $INSTANCES
          echo "instances=$INSTANCES" | tr -d "\n" >> $GITHUB_OUTPUT

  release:
    name: Update ${{ matrix.instance }} production
    needs:
      - find-instances
      - determine-version
    strategy:
      fail-fast: false
      matrix:
        instance: ${{ fromJSON(needs.find-instances.outputs.instances) }}
      max-parallel: 2 # don't occupy all the runners and reduce load on deployment infra (harbor, openshift)
    uses: ./.github/workflows/release.yml
    with:
      composition: hitobito/ose_composition_${{ matrix.instance }}
      release_type: custom
      next_version: ${{ needs.determine-version.outputs.version }}
      stage: production
      target_branch: ${{ inputs.target_branch }}
    secrets: inherit

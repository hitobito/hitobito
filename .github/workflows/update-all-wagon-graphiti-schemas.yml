name: 'Update Wagon Graphiti Schemas'

on:
  workflow_dispatch:
    inputs:
      core_ref:
        description: Use a specific version of the core for the workflow run. Defaults to the main branch.
        default: ""
      wagon_dependency_ref:
        description: Use a specific version of the wagon dependency for the workflow run. Defaults to the main branch.
        default: ""
      wagon_ref:
        description: Use a specific version of the wagon dependency for the workflow run. Defaults to the main branch.
        default: ""
  pull_request:
    types: [labeled]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }} # auto-cancel previous runs of this same workflow on the same PR, if any are still running

permissions:
  contents: write
  pull-requests: write

jobs:
  find-wagons:
    name: 'Find all affected wagons'
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && github.event.action == 'labeled' && github.event.label.name == 'update-wagon-graphiti-schema!')
    runs-on: 'ubuntu-latest'
    outputs:
      wagons: ${{ steps.list-wagon-repositories.outputs.wagons }}

    steps:
      - name: 'List wagon repositories with API customizations'
        id: list-wagon-repositories
        run: |
          WAGONS=$(gh repo list hitobito -L 100 --no-archived --json owner,name | \
            jq 'map(select(.name | test("^hitobito_"))) | map({ owner: .owner.login, repo: .name, name: .name | match("^hitobito_(pbs|sac_cas|sww|swb|pfadi_de)$").captures[0].string })')
          echo $WAGONS
          echo "wagons=$WAGONS" | tr -d "\n" >> $GITHUB_OUTPUT
        env:
          # This PAT needs access to all repos, Read access to metadata and Read and Write access to actions, code, and pull requests
          GH_TOKEN: ${{ secrets.WAGON_TESTS_GITHUB_TOKEN }}

  update-wagon-graphiti-schemas:
    name: 'Update ${{ matrix.wagon.name }} wagon graphiti schema'
    runs-on: 'ubuntu-latest'
    needs: [find-wagons]
    strategy:
      fail-fast: false
      matrix:
        wagon: ${{ fromJSON(needs.find-wagons.outputs.wagons) }}
      max-parallel: 5
    env:
      RAILS_DB_ADAPTER: nulldb
    steps:
      - name: "Determine common branch and set branch name for wagon"
        env:
          INPUT_WAGON_REF: ${{ inputs.wagon_ref }}
        run: |
          COMMON_BRANCH_NAME="${{github.head_ref || github.ref_name}}"
          if [ -z "$INPUT_WAGON_REF" ]; then
            WAGON_REF=$(git ls-remote --heads https://github.com/${{matrix.wagon.owner}}/${{matrix.wagon.repo}} | cut -d/ -f3- | grep -x "$COMMON_BRANCH_NAME" || echo 'master')
          else
            WAGON_REF=$INPUT_WAGON_REF
          fi

          echo "WAGON_REF=$WAGON_REF" >> $GITHUB_ENV
        shell: bash

      - name: Get PR Number
        id: get-pr
        env:
          GH_TOKEN: ${{ secrets.WAGON_TESTS_GITHUB_TOKEN }}
          BRANCH: ${{ github.head_ref || github.ref_name }}
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"

          # If empty (manual trigger), ask GitHub CLI for a PR matching this branch
          if [ -z "$PR_NUMBER" ]; then
            PR_NUMBER=$(gh pr list --head "$BRANCH" --json number --jq '.[0].number')
          fi

          if [ -n "$PR_NUMBER" ]; then
            echo "Found PR #$PR_NUMBER"
            echo "pr=$PR_NUMBER" >> $GITHUB_OUTPUT
            echo "PR=$PR_NUMBER" >> $GITHUB_ENV
          else
            echo "Found no PR, using branch name as a fallback"
            echo "pr=$BRANCH" >> $GITHUB_OUTPUT
            echo "PR=$BRANCH" >> $GITHUB_ENV
          fi

      - name: Check out core with shared setup action
        uses: actions/checkout@v4
        with:
          repository: hitobito/hitobito
          ref: ${{ github.ref || inputs.core_ref }}
          path: .hitobito_core_repo
          fetch-depth: 1

      - name: "Prepare"
        uses: ./.hitobito_core_repo/.github/actions/wagon-ci-setup
        with:
          github_token: ${{ secrets.WAGON_TESTS_GITHUB_TOKEN }}
          migrations: false
          assets: false
          wagon_repository: ${{ matrix.wagon.repo }}
          wagon_dependency_repository: hitobito_youth
          core_ref: ${{ github.ref || inputs.core_ref }}
          wagon_dependency_ref: ${{ inputs.wagon_dependency_ref || 'master' }}

      - name: Update graphiti schema
        working-directory: ${{ matrix.wagon.repo }}
        run: |
          bundle exec rake app:graphiti:schema:generate

      - name: Commit updated schema
        id: commit-schema
        working-directory: ${{ matrix.wagon.repo }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # Check if there are actually changes to the schema
          if [[ -n "$(git status --porcelain)" ]]; then
            git diff spec/support/graphiti/schema.json
            git add spec/support/graphiti/schema.json
            git commit -m "Update Graphiti schema (hitobito/hitobito#$PR)"
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "No changes detected"
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Push commit
        if: steps.commit-schema.outputs.changed == 'true'
        working-directory: ${{ matrix.wagon.repo }}
        env:
          GH_TOKEN: ${{ secrets.WAGON_TESTS_GITHUB_TOKEN }}
        run: |
          BRANCH_NAME="${{ github.head_ref || github.ref_name }}"
          git checkout -b "$BRANCH_NAME"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/hitobito/${{ matrix.wagon.repo }}.git"
          git pull --rebase
          git push origin "$BRANCH_NAME"
          echo "branch_name=$BRANCH_NAME" >> $GITHUB_ENV

      - name: Open a pull request with the changes
        if: steps.commit-schema.outputs.changed == 'true'
        working-directory: ${{ matrix.wagon.repo }}
        env:
          GH_TOKEN: ${{ secrets.WAGON_TESTS_GITHUB_TOKEN }}
        run: |
          gh pr create \
            --title "Update schema" \
            --body "Automated schema update triggered by GitHub Action." \
            --base "master" \
            --head "$BRANCH_NAME" || echo "PR already exists or failed to create"
